services:
  postgres:
    image: postgres:16-alpine
    container_name: gofer_db
    environment:
      POSTGRES_USER: gofer
      POSTGRES_PASSWORD: gofer
      POSTGRES_DB: gofer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gofer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: